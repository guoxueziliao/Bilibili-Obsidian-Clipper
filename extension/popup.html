<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilibili Clipper</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="top">
        <strong>B站字幕</strong>
        <button id="settingsBtn" type="button" class="ghost">设置</button>
      </header>

      <p id="status" class="status">准备就绪</p>

      <div class="section-title">属性</div>
      <section class="props">
        <div class="prop-row"><span class="k">标题</span><span id="propTitle" class="v"></span></div>
        <div class="prop-row"><span class="k">链接</span><span id="propUrl" class="v"></span></div>
        <div class="prop-row"><span class="k">创建日期</span><span id="propCreated" class="v"></span></div>
        <div class="prop-row prop-row-tags"><span class="k">标签</span><textarea id="propTags" class="v input-tags" rows="2" placeholder="逗号分隔标签"></textarea></div>
      </section>

      <label class="label" for="subtitleSelect">字幕语言</label>
      <select id="subtitleSelect"></select>

      <label class="label" for="preview">字幕预览</label>
      <textarea id="preview" readonly wrap="off"></textarea>

      <div class="actions">
        <button id="refreshBtn" type="button">刷新</button>
        <button id="copyBtn" type="button">复制</button>
        <button id="downloadBtn" type="button">下载</button>
      </div>
      <button id="sendBtn" type="button" class="send">保存到 Obsidian</button>
      <p id="message" class="message"></p>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
